services:
  - type: web
    name: fastapi-learning          # 这里可改服务名
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./app.db
      - key: SECRET_KEY
        generateValue: true         # 让 Render 自动生成安全密钥
      - key: ALLOWED_ORIGINS
        value: '["*"]'