<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI 学习项目 - 前端演示</title>
    <style>
        :root { --primary: #009688; --bg: #f5f7fa; --card: #fff; --text: #333; --danger: #e53935; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        h1 { color: var(--primary); }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 20px; border: none; background: #ddd; cursor: pointer; border-radius: 6px 6px 0 0; font-size: 14px; }
        .tab.active { background: var(--primary); color: white; }
        .tab-content { display: none; background: var(--card); padding: 20px; border-radius: 0 8px 8px 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; }
        input, textarea, button { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; margin-top: 10px; }
        button:hover { opacity: 0.9; }
        button.danger { background: var(--danger); }
        .result { margin-top: 15px; padding: 10px; background: #eef; border-radius: 4px; white-space: pre-wrap; font-family: monospace; max-height: 300px; overflow: auto; }
        .chat-box { height: 300px; overflow-y: auto; background: #f1f1f1; padding: 10px; border-radius: 4px; margin-bottom: 10px; }
        .chat-msg { margin-bottom: 8px; }
        .system { color: #888; font-style: italic; }
        .alert { padding: 8px 12px; border-radius: 4px; margin-bottom: 10px; }
        .alert-success { background: #c8e6c9; color: #2e7d32; }
        .alert-error { background: #ffcdd2; color: #c62828; }
    </style>
</head>
<body>
    <h1>🚀 FastAPI 全特性学习项目 - 前端演示</h1>
    <div class="tabs">
        <button class="tab active" onclick="switchTab('auth')">认证</button>
        <button class="tab" onclick="switchTab('items')">物品管理</button>
        <button class="tab" onclick="switchTab('upload')">文件上传</button>
        <button class="tab" onclick="switchTab('task')">后台任务</button>
        <button class="tab" onclick="switchTab('ws')">WebSocket聊天</button>
        <button class="tab" onclick="switchTab('user')">用户信息</button>
    </div>

    <!-- 认证 Tab -->
    <div id="tab-auth" class="tab-content active">
        <h2>🔐 注册 / 登录</h2>
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="auth-username" placeholder="至少3位">
        </div>
        <div class="form-group">
            <label>邮箱</label>
            <input type="email" id="auth-email" placeholder="user@example.com">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="auth-password" placeholder="至少6位，含数字">
        </div>
        <button onclick="register()">注册</button>
        <button onclick="login()">登录</button>
        <div id="auth-result" class="result" style="display:none;"></div>
        <div id="user-info" class="alert alert-success" style="display:none;"></div>
    </div>

    <!-- 物品 Tab -->
    <div id="tab-items" class="tab-content">
        <h2>📦 物品管理（需登录）</h2>
        <button onclick="loadItems()">刷新列表</button>
        <div id="items-list" class="result" style="margin-top:10px;"></div>
        <h3>创建/更新物品</h3>
        <div class="form-group">
            <label>标题</label>
            <input type="text" id="item-title" placeholder="物品名称">
        </div>
        <div class="form-group">
            <label>描述</label>
            <textarea id="item-desc" rows="3" placeholder="可选描述"></textarea>
        </div>
        <input type="hidden" id="item-id">
        <button onclick="createItem()">创建</button>
        <button onclick="updateItem()">更新选中物品</button>
        <button class="danger" onclick="deleteItem()">删除选中物品</button>
        <div id="items-result" class="result" style="display:none;"></div>
    </div>

    <!-- 上传 Tab -->
    <div id="tab-upload" class="tab-content">
        <h2>📁 文件上传（需登录）</h2>
        <input type="file" id="upload-file">
        <button onclick="uploadFile()">上传</button>
        <div id="upload-result" class="result" style="display:none;"></div>
    </div>

    <!-- 后台任务 Tab -->
    <div id="tab-task" class="tab-content">
        <h2>⚙️ 后台任务演示</h2>
        <div class="form-group">
            <label>通知邮箱</label>
            <input type="email" id="task-email" placeholder="user@example.com">
        </div>
        <button onclick="sendNotification()">提交后台通知</button>
        <div id="task-result" class="result" style="display:none;"></div>
    </div>

    <!-- WebSocket Tab -->
    <div id="tab-ws" class="tab-content">
        <h2>💬 WebSocket 聊天室</h2>
        <div class="form-group">
            <label>你的昵称</label>
            <input type="text" id="ws-username" value="guest">
        </div>
        <button id="ws-connect-btn" onclick="connectWS()">连接聊天室</button>
        <button class="danger" id="ws-disconnect-btn" onclick="disconnectWS()" style="display:none;">断开</button>
        <div class="chat-box" id="chat-box"></div>
        <div class="form-group">
            <input type="text" id="chat-input" placeholder="输入消息..." disabled>
        </div>
        <button id="chat-send-btn" onclick="sendChatMsg()" disabled>发送</button>
    </div>

    <!-- 用户信息 Tab -->
    <div id="tab-user" class="tab-content">
        <h2>👤 用户信息（需登录）</h2>
        <button onclick="getCurrentUser()">获取当前用户信息</button>
        <button onclick="accessAdmin()">尝试访问管理员端点</button>
        <div id="user-result" class="result" style="display:none;"></div>
    </div>

    <script>
        // ============================ 基础配置 ============================
        const BASE = 'http://127.0.0.1:8000';  // 如果前后端不在同域，改为 'http://127.0.0.1:8000'
        let token = localStorage.getItem('token') || '';
        let currentItemId = null;  // 当前选中的物品ID
        let ws = null;

        function authHeaders() {
            return token ? { 'Authorization': 'Bearer ' + token } : {};
        }

        async function request(url, options = {}) {
            const res = await fetch(BASE + url, {
                headers: { 'Content-Type': 'application/json', ...authHeaders(), ...options.headers },
                ...options
            });
            const data = await res.json();
            return { status: res.status, data };
        }

        // ============================ Tab 切换 ============================
        function switchTab(name) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            event.target.classList.add('active');
        }

        // ============================ 认证 ============================
        function showAuthResult(data, isError = false) {
            const el = document.getElementById('auth-result');
            el.style.display = 'block';
            el.textContent = JSON.stringify(data, null, 2);
            el.style.background = isError ? '#ffcdd2' : '#eef';
        }

        async function register() {
            const username = document.getElementById('auth-username').value;
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const { status, data } = await request('/auth/register', {
                method: 'POST',
                body: JSON.stringify({ username, email, password })
            });
            showAuthResult(data, status >= 400);
            if (status === 201) {
                showAuthResult(data);
            }
        }

        async function login() {
    const username = document.getElementById('auth-username').value;
    const password = document.getElementById('auth-password').value;
    const formData = new URLSearchParams();
    formData.append('username', username);
    formData.append('password', password);
    const res = await fetch(BASE + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: formData
    });
    const data = await res.json();
    showAuthResult(data, res.status >= 400);
    if (res.status === 200 && data.access_token) {
        token = data.access_token;
        localStorage.setItem('token', token);
        document.getElementById('user-info').style.display = 'block';
        document.getElementById('user-info').textContent = '✅ 已登录，令牌已保存。';
    }
}

        // ============================ 物品 ============================
        async function loadItems() {
            const { status, data } = await request('/items/');
            const el = document.getElementById('items-list');
            if (status === 200) {
                el.innerHTML = '<strong>物品列表：</strong><br>' +
                    data.items.map(item => `<div onclick="selectItem(${item.id})" style="cursor:pointer; padding:5px; border-bottom:1px solid #eee;">
                        [ID:${item.id}] ${item.title} - ${item.description || ''} (owner: ${item.owner_id})
                    </div>`).join('');
            } else {
                el.textContent = '加载失败: ' + JSON.stringify(data);
            }
        }

        function selectItem(id) {
            currentItemId = id;
            document.getElementById('item-id').value = id;
            alert('已选中物品 ID: ' + id);
        }

        async function createItem() {
            const title = document.getElementById('item-title').value;
            const description = document.getElementById('item-desc').value;
            const { status, data } = await request('/items/', {
                method: 'POST',
                body: JSON.stringify({ title, description })
            });
            document.getElementById('items-result').style.display = 'block';
            document.getElementById('items-result').textContent = JSON.stringify(data, null, 2);
            if (status === 201) loadItems();
        }

        async function updateItem() {
            const id = document.getElementById('item-id').value;
            if (!id) return alert('请先选择一个物品！');
            const title = document.getElementById('item-title').value;
            const description = document.getElementById('item-desc').value;
            const body = {};
            if (title) body.title = title;
            if (description) body.description = description;
            const { status, data } = await request(`/items/${id}`, {
                method: 'PUT',
                body: JSON.stringify(body)
            });
            document.getElementById('items-result').style.display = 'block';
            document.getElementById('items-result').textContent = JSON.stringify(data, null, 2);
            if (status === 200) loadItems();
        }

        async function deleteItem() {
            const id = document.getElementById('item-id').value;
            if (!id) return alert('请先选择一个物品！');
            if (!confirm('确定删除物品 ' + id + ' 吗？')) return;
            const res = await fetch(BASE + `/items/${id}`, {
                method: 'DELETE',
                headers: authHeaders()
            });
            document.getElementById('items-result').style.display = 'block';
            if (res.status === 204) {
                document.getElementById('items-result').textContent = '删除成功 (204 No Content)';
                loadItems();
            } else {
                const data = await res.json();
                document.getElementById('items-result').textContent = JSON.stringify(data, null, 2);
            }
        }

        // ============================ 上传 ============================
        async function uploadFile() {
            const fileInput = document.getElementById('upload-file');
            const file = fileInput.files[0];
            if (!file) return alert('请选择文件');
            const formData = new FormData();
            formData.append('file', file);
            const res = await fetch(BASE + '/upload/file', {
                method: 'POST',
                headers: authHeaders(),  // Content-Type 会自动设为 multipart/form-data
                body: formData
            });
            const data = await res.json();
            document.getElementById('upload-result').style.display = 'block';
            document.getElementById('upload-result').textContent = JSON.stringify(data, null, 2);
        }

        // ============================ 后台任务 ============================
        async function sendNotification() {
            const email = document.getElementById('task-email').value;
            const { status, data } = await request(`/tasks/send-notification?email=${encodeURIComponent(email)}`, {
                method: 'POST'
            });
            document.getElementById('task-result').style.display = 'block';
            document.getElementById('task-result').textContent = JSON.stringify(data, null, 2);
        }

        // ============================ WebSocket ============================
        function connectWS() {
            const username = document.getElementById('ws-username').value || 'guest';
            ws = new WebSocket(`ws://127.0.0.1:8000/ws/chat/${username}`);
            ws.onopen = () => {
                document.getElementById('ws-connect-btn').style.display = 'none';
                document.getElementById('ws-disconnect-btn').style.display = 'inline-block';
                document.getElementById('chat-input').disabled = false;
                document.getElementById('chat-send-btn').disabled = false;
                addChatMsg('system', '已连接到聊天室');
            };
            ws.onmessage = (event) => {
                let msg = event.data;
                try { msg = JSON.parse(event.data); } catch(e) {}
                if (typeof msg === 'object' && msg.type) {
                    addChatMsg(msg.type === 'system' ? 'system' : msg.username, msg.message);
                } else {
                    addChatMsg('system', msg);
                }
            };
            ws.onclose = () => {
                document.getElementById('ws-connect-btn').style.display = 'inline-block';
                document.getElementById('ws-disconnect-btn').style.display = 'none';
                document.getElementById('chat-input').disabled = true;
                document.getElementById('chat-send-btn').disabled = true;
                addChatMsg('system', '连接已断开');
            };
        }

        function disconnectWS() {
            if (ws) ws.close();
        }

        function sendChatMsg() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (msg && ws) {
                ws.send(msg);
                addChatMsg('我', msg);
                input.value = '';
            }
        }

        function addChatMsg(sender, text) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = 'chat-msg ' + (sender === 'system' ? 'system' : '');
            div.textContent = (sender === 'system' ? '' : sender + ': ') + text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // ============================ 用户信息 ============================
        async function getCurrentUser() {
            const { status, data } = await request('/users/me');
            document.getElementById('user-result').style.display = 'block';
            document.getElementById('user-result').textContent = JSON.stringify(data, null, 2);
        }

        async function accessAdmin() {
            const { status, data } = await request('/users/admin-only');
            document.getElementById('user-result').style.display = 'block';
            document.getElementById('user-result').textContent = `状态 ${status}: ` + JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
